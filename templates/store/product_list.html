{% extends 'base.html' %}
{% block content %}

<h2>Products</h2>

<div style="display:flex; gap:20px;">

{% for product in products %}
<div style="border:1px solid #ccc; padding:15px; width:200px;">

<h3>{{ product.name }}</h3>

<p>Price: ${{ product.price }}</p>

<a href="{% url 'product_detail' product.id %}">View Product</a>

</div>
{% endfor %}

</div>

{% endblock %}
